services:
  postgres:
    image: postgres:15-alpine
    container_name: jobcrawler-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-jobcrawler}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: jobcrawler
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jobcrawler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: jobcrawler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./job-crawler
      dockerfile: Dockerfile
    container_name: jobcrawler-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-jobcrawler}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-must-be-at-least-256-bits-long!!}
      OPENCLAW_API_URL: ${OPENCLAW_API_URL:-}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@job.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
    shm_size: '2gb'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - backend-logs:/app/logs
    restart: always

  frontend:
    build:
      context: ./job-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:8080/ws}
    container_name: jobcrawler-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
  redis-data:
  uploads:
  backend-logs:
