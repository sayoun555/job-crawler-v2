# Application Configuration - PROD Profile
spring.application.name=job-crawler

# PostgreSQL (prod)
spring.datasource.url=jdbc:postgresql://localhost:5432/jobcrawler
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT (24시간)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# OpenClaw AI API
openclaw.api.url=${OPENCLAW_API_URL:http://localhost:11434/api/generate}
openclaw.api.model=${OPENCLAW_API_MODEL:llama3}

# App
app.base-url=https://job.eekky.com

# Logging
logging.level.com.portfolio.jobcrawler=INFO
logging.level.org.hibernate.SQL=WARN

# Server
server.port=8080
