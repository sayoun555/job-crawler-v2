# Application Configuration - PROD Profile
spring.application.name=job-crawler

# PostgreSQL (prod)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/jobcrawler
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP 커넥션 풀
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT (24시간)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# OpenClaw AI API
openclaw.api.url=${OPENCLAW_API_URL:http://localhost:11434/api/generate}
openclaw.api.key=${OPENCLAW_API_KEY:}
openclaw.api.model=${OPENCLAW_API_MODEL:llama3}

# App
app.base-url=https://job.eekky.com

# Logging
logging.level.com.portfolio.jobcrawler=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Logging - 파일
logging.file.name=logs/job-crawler.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB

# AI 동시 요청 제한 (인스턴스 수 × 5, 운영 중 조정 가능)
ai.max-concurrent-requests=15

# Crawler
crawler.detail.concurrency=3

# AES-256 암호화 키 (환경변수: ENCRYPTION_KEY, 32자 이상)
encryption.key=${ENCRYPTION_KEY:default-aes-key-must-be-32-bytes!}

# Admin (환경변수로 관리: ADMIN_EMAIL, ADMIN_PASSWORD)
admin.email=${ADMIN_EMAIL:#{null}}
admin.password=${ADMIN_PASSWORD:#{null}}

# Server
server.port=8080

# Swagger — 운영 환경에서는 비활성화
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator — 운영 환경에서는 최소 노출
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
