# Application Configuration - DEV Profile
spring.application.name=job-crawler

# PostgreSQL Database (dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/jobcrawler
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:jobcrawler}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=${JWT_SECRET:dev-jwt-secret-key-must-be-at-least-256-bits-long!!}
jwt.access-expiration=18000000
jwt.refresh-expiration=604800000

# OpenClaw AI API (OpenAI Compatible)
openclaw.api.url=${OPENCLAW_API_URL:http://127.0.0.1:18789/v1/chat/completions}
openclaw.api.key=${OPENCLAW_API_KEY:}

# App
app.base-url=http://localhost:3000

# Logging
logging.level.com.portfolio.jobcrawler=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Logging - file
logging.file.name=logs/job-crawler.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB

# Admin
admin.email=${ADMIN_EMAIL:admin@job.com}
admin.password=${ADMIN_PASSWORD:}

# GitHub API (인증 시 시간당 5000회, 미인증 시 60회)
github.api.token=${GITHUB_API_TOKEN:}

# Crawler
crawler.detail.concurrency=2

# Server
server.port=8080
