# Application Configuration - DEV Profile
spring.application.name=job-crawler

# PostgreSQL Database (dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/jobcrawler
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=jobcrawler
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=job-crawler-jwt-secret-key-must-be-at-least-256-bits-long!!
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

# OpenClaw AI API (OpenAI Compatible)
openclaw.api.url=http://127.0.0.1:18789/v1/chat/completions
openclaw.api.key=a0707484b483699894399c9063e06ae62a35c5d35b585053

# App
app.base-url=http://localhost:3000

# Logging - 콘솔
logging.level.com.portfolio.jobcrawler=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Logging - 파일 (크롤링 로그 보존)
logging.file.name=logs/job-crawler.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB

# Admin (개발용)
admin.email=admin@job.com
admin.password=admin1234

# Crawler - 상세 페이지 병렬 수 (1로 설정 시 순차 처리)
crawler.detail.concurrency=2

# Server
server.port=8080
