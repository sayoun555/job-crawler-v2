# Application Configuration - DEV Profile
spring.application.name=job-crawler

# PostgreSQL Database (dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/jobcrawler
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:jobcrawler}
spring.datasource.password=${DB_PASSWORD:password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=${JWT_SECRET:dev-jwt-secret-key-must-be-at-least-256-bits-long!!}
jwt.access-expiration=18000000
jwt.refresh-expiration=604800000

# OpenClaw AI API (OpenAI Compatible)
openclaw.api.url=${OPENCLAW_API_URL:http://127.0.0.1:18789/v1/chat/completions}
openclaw.api.key=${OPENCLAW_API_KEY:}

# App
app.base-url=http://localhost:3001
file.upload-dir=${user.dir}/uploads

# AI 설정
ai.temperature=0.3

# Logging
logging.level.com.portfolio.jobcrawler=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Logging - file
logging.file.name=logs/job-crawler.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB

# Admin
admin.email=${ADMIN_EMAIL:admin@job.com}
admin.password=${ADMIN_PASSWORD:}

# GitHub API (인증 시 시간당 5000회, 미인증 시 60회)
github.api.token=${GITHUB_API_TOKEN:}

# AI 동시 요청 제한 (인스턴스 3개 × 5 = 15)
ai.max-concurrent-requests=15

# Crawler
crawler.detail.concurrency=2

# Server
server.port=8080

# Actuator (모니터링 엔드포인트)
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.metrics.tags.application=${spring.application.name}

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# 파일 업로드 크기 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# HikariCP 커넥션 풀
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Gzip 응답 압축
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
