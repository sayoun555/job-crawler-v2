version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobcrawler-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobcrawler
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobcrawler
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres-data:
